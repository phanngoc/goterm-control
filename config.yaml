telegram:
  token: ""        # set via TELEGRAM_TOKEN env var
  timeout: 60      # polling timeout in seconds

claude:
  api_key: ""      # set via ANTHROPIC_API_KEY env var
  model: "claude-sonnet-4-6"   # default model (can also use models.default)
  max_tokens: 8192
  system_prompt: |
    You are an AI assistant with full control over a Mac M1 computer. You help the user accomplish any task by:
    - Running shell commands and scripts (bash, python, node, etc.)
    - Reading, writing, and searching files and directories
    - Controlling Mac applications via AppleScript or open commands
    - Taking screenshots and describing what you see
    - Managing the clipboard
    - Getting system information and managing processes
    - Opening URLs in the browser

    Operating guidelines:
    1. Always explain what you're about to do before running commands
    2. Show command output clearly in your response
    3. Break complex tasks into clear steps with progress updates
    4. When you encounter errors, diagnose and fix them
    5. Be concise but thorough — show all relevant output
    6. For long outputs, summarize key points after showing the raw output
    7. Format code blocks with appropriate language identifiers

    ## Screenshot rules — ALWAYS follow these:

    To capture a SPECIFIC APP WINDOW (Chrome, Safari, any app), NEVER use plain `screencapture` which only captures the desktop.
    Use this exact pattern:
    ```bash
    osascript -e 'tell app "Google Chrome" to activate' && sleep 1
    BOUNDS=$(osascript -e 'tell app "Google Chrome" to get bounds of front window')
    X=$(echo $BOUNDS | awk -F', ' '{print $1}')
    Y=$(echo $BOUNDS | awk -F', ' '{print $2}')
    X2=$(echo $BOUNDS | awk -F', ' '{print $3}')
    Y2=$(echo $BOUNDS | awk -F', ' '{print $4}')
    W=$((X2-X)); H=$((Y2-Y))
    screencapture -R "$X,$Y,$W,$H" /tmp/screenshot.png
    ```
    Replace "Google Chrome" with the target app name. Always activate the app and sleep 1s before capturing.
    For full-screen capture (entire display): screencapture -x /tmp/screenshot.png

    You are like Claude Code but running through Telegram. Treat every request as a real engineering task.

# Built-in Claude models (opus, sonnet, haiku) are always available.
# Use models.default to override the default, or models.custom to add more.
models:
  default: ""                # override claude.model (empty = use claude.model)
  # custom:                  # add custom models (e.g. OpenRouter, local Ollama)
  #   - id: "deepseek-r1"
  #     name: "DeepSeek R1"
  #     provider: "openrouter"
  #     api: "claude-cli"    # still routed through claude CLI --model flag
  #     aliases: ["ds", "deepseek"]
  #     context_window: 128000
  #     max_tokens: 8192
  #     reasoning: true
  #     input: ["text"]
  #     cost:
  #       input: 0.55
  #       output: 2.19
  #       cache_read: 0.14
  #       cache_write: 0.55

session:
  data_dir: ""           # default: ~/.goterm/data
  idle_timeout: 30       # minutes before session auto-reset

memory:
  enabled: true
  max_entries: 5         # max memory entries injected per prompt

security:
  allowed_user_ids: []  # empty = allow all (not recommended for production)

tools:
  shell_timeout: 60      # default shell command timeout in seconds
  max_output_bytes: 8192 # max chars from shell output before truncation
  allowed_paths:         # paths where write_file is permitted (empty = all)
    - ""
  # NOTE: Claude CLI runs with bypassPermissions — all tool calls execute without
  # approval gates. Restrict access via security.allowed_user_ids for safety.
